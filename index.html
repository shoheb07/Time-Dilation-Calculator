<!DOCTYPE html>
<html>
<head>
    <title>Time Dilation Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Time Dilation Calculator</h1>

<input
type="number"
id="time"

>

placeholder="Velocity (% of speed of light)"
>

<script src="script.js"></script>

</body>
</html>
